<!DOCTYPE html>
<html>
	<head>
		<title>SIGIA</title>
		<link rel="stylesheet" href="style/index.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css">
	</head>
	<body>
		<div class="container">
			<div class="white-box">
				<div class="edit-me-daddy">
					<div class="image-container" id="image-container">
						<img src="images/sigiaNoLetters.png" alt="Sigia Icon">
					</div>
					<h1>Registrarse</h1>
					<form>
						<div class="input-form">
							<i class="fa-solid fa-address-card"></i>
							<input type="text" id="names" placeholder="Nombres">
						</div>
						<div class="input-form">
							<i class="fa-solid fa-address-card"></i>
							<input type="text" id="lastnames" placeholder="Apellidos">
						</div>
						<div class="input-form">
							<i class="fa-sharp fa-solid fa-envelope"></i>
							<input type="email" id="email" placeholder="Correo electronico">
						</div>
						<div class="input-form">
							<i class="fa-solid fa-lock"></i>
							<input type="password" id="password" placeholder="Contraseña">
						</div>
						<div class="input-form">
							<i class="fa-solid fa-lock"></i>
							<input type="password" id="repeatPassword" placeholder="Repetir contraseña"> 
						</div>
						<a href="#" class="forgot-password"><p>Olvide mi contraseña</p></a>			
						<input type="submit" value="Registrar">
					</form>
					<a href="#" class="cancel"><p>Cancelar</p></a>
				</div>
			</div>
		</div>
	</body>
</html>
